<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1420"/>
      <stop offset="40%" stop-color="#1E3A8A"/>
      <stop offset="70%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#0A0E1A"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="75%" r="45%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow1)"/>
  <rect width="1600" height="900" fill="url(#glow2)"/>

  <!-- Orbs -->
  <circle cx="1280" cy="220" r="140" fill="#60A5FA" opacity="0.22" filter="url(#blur)"/>
  <circle cx="300" cy="700" r="180" fill="#C084FC" opacity="0.22" filter="url(#blur)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 225 H1600"/>
    <path d="M0 450 H1600"/>
    <path d="M0 675 H1600"/>
    <path d="M400 0 V900"/>
    <path d="M800 0 V900"/>
    <path d="M1200 0 V900"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(800 380)">
    <circle r="70" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
    <circle r="48" fill="#ffffff" fill-opacity="0.04" stroke="#60A5FA" stroke-opacity="0.6" stroke-width="2"/>
    <path d="M -18 -8 Q 0 -28 18 -8 Q 0 12 -18 -8 Z" fill="#60A5FA" opacity="0.9"/>
    <path d="M -18 8 Q 0 28 18 8 Q 0 -12 -18 8 Z" fill="#C084FC" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="800" y="530" text-anchor="middle" font-family="'Heebo', 'Helvetica', sans-serif" font-size="88" font-weight="900" fill="#ffffff" letter-spacing="-2">
    Qi Flow
  </text>
  <text x="800" y="580" text-anchor="middle" font-family="'Heebo', 'Helvetica', sans-serif" font-size="24" font-weight="500" fill="#ffffff" fill-opacity="0.6">
    ריפוי הוליסטי
  </text>

  <!-- Browser chrome hint -->
  <g transform="translate(40 40)" opacity="0.55">
    <circle cx="0" cy="0" r="7" fill="#F87171"/>
    <circle cx="22" cy="0" r="7" fill="#FBBF24"/>
    <circle cx="44" cy="0" r="7" fill="#34D399"/>
  </g>
</svg>
